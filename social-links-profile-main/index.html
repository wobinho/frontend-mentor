<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="https://fonts.google.com/specimen/Inter" />

    <title>Frontend Mentor | Social links profile</title>
  </head>
  <body>
    <div class="main__container">
      <div class="card__container">
        <div class="profile__avatar">
          <img src="assets/images/avatar-jessica.jpeg" />
        </div>
        <div class="profile__info">
          <p class="profile__name">Jessica Randall</p>
          <p class="profile__address">London, United Kingdom</p>
        </div>
        <div class="profile__bio">
          <p>"Front-end developer and avid reader."</p>
        </div>
        <div class="button__container">
          <button class="btn__github">GitHub</button>
          <button class="btn__frontend">Frontend Mentor</button>
          <button class="btn__linkedin">LinkedIn</button>
          <button class="btn__twitter">Twitter</button>
          <button class="btn__instagram">Instagram</button>
        </div>
      </div>
    </div>
  </body>
</html>
