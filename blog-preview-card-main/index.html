<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />

    <title>Frontend Mentor | Blog preview card</title>
  </head>
  <body>
    <div class="main__container">
      <div class="main__card">
        <div class="top__image">
          <img src="assets/images/illustration-article.svg" />
        </div>
        <div class="card__info">
          <div class="learning__text"><p>Learning</p></div>
          <div class="published__date">Published 21 Dec 2023</div>
        </div>
        <div class="title__text">
          <p>HTML & CSS foundations</p>
        </div>
        <div class="body__text">
          <p>These languages are the backbone of every</p>
          <p>website, defining structure, content, and</p>
          <p>presentation.</p>
        </div>
        <div class="author__section">
          <div class="author__avatar">
            <img src="assets/images/image-avatar.webp" />
          </div>
          <div class="author__name">
            <p>Greg Hooper</p>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
